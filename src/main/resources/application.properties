spring.datasource.url=jdbc:postgresql://localhost:5432/dataprocessing
spring.datasource.username=dataprocessing
spring.datasource.password=dataprocessing
# HikariCP pool size is set programmatically in WorkerPoolConfig to match N_WORKERS

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

management.endpoints.web.exposure.include=health

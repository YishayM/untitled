version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowsecurity
      POSTGRES_USER: flowsecurity
      POSTGRES_PASSWORD: flowsecurity
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowsecurity"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/flowsecurity
      SPRING_DATASOURCE_USERNAME: flowsecurity
      SPRING_DATASOURCE_PASSWORD: flowsecurity
    depends_on:
      postgres:
        condition: service_healthy
